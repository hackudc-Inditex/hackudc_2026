<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zara Bundle Annotator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
.header { background: #1a1a1a; padding: 10px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #333; flex-shrink: 0; }
.header input { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 14px; }
.header input:focus { outline: none; border-color: #4a9eff; }
.header select { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 6px 8px; border-radius: 6px; font-size: 13px; }
.progress-bar { flex: 1; background: #2a2a2a; border-radius: 10px; height: 20px; overflow: hidden; position: relative; min-width: 200px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #16a34a); transition: width 0.3s; border-radius: 10px; }
.progress-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
.header-stats { font-size: 12px; color: #888; white-space: nowrap; }

/* Navigation */
.nav { background: #1a1a1a; padding: 8px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #333; flex-shrink: 0; }
.nav button { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
.nav button:hover { background: #3a3a3a; border-color: #666; }
.nav button:active { background: #4a4a4a; }
.nav button.primary { background: #1d4ed8; border-color: #2563eb; }
.nav button.primary:hover { background: #2563eb; }
.nav button.export { background: #15803d; border-color: #16a34a; }
.nav button.export:hover { background: #16a34a; }
.nav .bundle-info { font-size: 14px; font-weight: 600; flex: 1; }
.nav .section-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.nav .section-badge.s1 { background: #7c3aed; }
.nav .section-badge.s2 { background: #0891b2; }
.nav .section-badge.s3 { background: #c2410c; }
.search-box { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 13px; width: 180px; }
.search-box:focus { outline: none; border-color: #4a9eff; }

/* Main content */
.main { display: flex; flex: 1; overflow: hidden; }

/* Bundle panel */
.bundle-panel { width: 38%; padding: 12px; display: flex; flex-direction: column; border-right: 1px solid #333; overflow: hidden; }
.bundle-img-container { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: zoom-in; position: relative; }
.bundle-img-container img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; transition: transform 0.3s; }
.bundle-img-container.zoomed { cursor: zoom-out; }
.bundle-img-container.zoomed img { transform: scale(2); cursor: zoom-out; }
.bundle-selection-summary { padding: 8px 0; font-size: 13px; color: #aaa; text-align: center; flex-shrink: 0; }
.bundle-selection-summary strong { color: #22c55e; }

/* Candidates grid */
.candidates-panel { flex: 1; overflow-y: auto; padding: 12px; }
.candidates-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
.candidate-card { background: #1a1a1a; border: 2px solid #333; border-radius: 8px; cursor: pointer; transition: all 0.15s; overflow: hidden; position: relative; }
.candidate-card:hover { border-color: #666; transform: translateY(-1px); }
.candidate-card.selected { border-color: #22c55e; background: #0a2a0a; box-shadow: 0 0 12px rgba(34, 197, 94, 0.2); }
.candidate-card.others-selected { border-color: #3b82f6; }
.candidate-card.selected.others-selected { border-color: #f59e0b; box-shadow: 0 0 12px rgba(245, 158, 11, 0.2); }
.candidate-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #222; }
.candidate-info { padding: 4px 6px; }
.candidate-desc { font-size: 10px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.candidate-score { font-size: 9px; color: #666; }
.candidate-rank { position: absolute; top: 4px; left: 4px; background: rgba(0,0,0,0.7); color: #aaa; padding: 1px 5px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.candidate-check { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%; background: #22c55e; display: none; align-items: center; justify-content: center; font-size: 13px; }
.candidate-card.selected .candidate-check { display: flex; }
.candidate-card.auto-confirmed { border-color: #22c55e; background: #062a06; opacity: 0.6; }
.candidate-card.auto-rejected { border-color: #ef4444; background: #2a0a0a; opacity: 0.4; }
.candidate-card.auto-confirmed .candidate-check { display: flex; background: #15803d; }
.auto-badge { position: absolute; top: 4px; right: 4px; background: #15803d; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; letter-spacing: 0.5px; }
.votes-badge { position: absolute; bottom: 30px; right: 4px; background: #2563eb; color: #fff; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 600; }

/* Loading */
.loading { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 18px; color: #666; }

/* Keyboard hints */
.kbd { display: inline-block; background: #333; border: 1px solid #555; border-radius: 3px; padding: 0 5px; font-size: 11px; font-family: monospace; color: #aaa; margin: 0 2px; }

/* Toast notifications */
.toast { position: fixed; bottom: 20px; right: 20px; background: #1d4ed8; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
    <label style="font-size:13px; color:#888;">Anotador:</label>
    <input type="text" id="annotator-name" placeholder="Tu nombre" style="width:130px;" />
    <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        <div class="progress-text" id="progress-text">0 / 0</div>
    </div>
    <div class="header-stats" id="header-stats"></div>
    <label style="font-size:13px; color:#888;">Seccion:</label>
    <select id="section-filter">
        <option value="all">Todas</option>
        <option value="1">1 - Mujer</option>
        <option value="2">2 - Hombre</option>
        <option value="3">3 - Ninos</option>
    </select>
    <span style="margin-left:12px; font-size:13px; color:#888;">Reparto:</span>
    <select id="reparto-mode" style="background:#2a2a2a; border:1px solid #444; color:#fff; padding:6px 8px; border-radius:6px; font-size:13px;">
        <option value="0-1">Todos (sin reparto)</option>
        <option value="0-2">A de 2</option>
        <option value="1-2">B de 2</option>
        <option value="0-3">A de 3</option>
        <option value="1-3">B de 3</option>
        <option value="2-3">C de 3</option>
        <option value="0-4">A de 4</option>
        <option value="1-4">B de 4</option>
        <option value="2-4">C de 4</option>
        <option value="3-4">D de 4</option>
    </select>
    <span id="reparto-info" style="font-size:11px; color:#888;"></span>
</div>

<div class="nav">
    <button onclick="prevBundle()"><span class="kbd">&larr;</span> Anterior</button>
    <button onclick="nextBundle()">Siguiente <span class="kbd">&rarr;</span></button>
    <button class="primary" onclick="nextUnannotated()">Siguiente sin anotar</button>
    <div class="bundle-info">
        <span id="bundle-id">-</span>
        <span class="section-badge" id="section-badge">-</span>
        <span style="font-weight:normal; color:#888; font-size:12px;" id="bundle-counter"></span>
    </div>
    <input type="text" class="search-box" id="search-box" placeholder="Buscar producto..." oninput="filterCandidates()" />
    <button class="export" onclick="exportLabels()">Exportar CSV</button>
</div>

<div class="main">
    <div class="bundle-panel">
        <div class="bundle-img-container" id="bundle-img-container" onclick="toggleZoom()">
            <img id="bundle-img" src="" alt="Bundle" />
        </div>
        <div class="bundle-selection-summary" id="selection-summary">
            Seleccionados: <strong>0</strong> | Otros: 0
        </div>
    </div>
    <div class="candidates-panel" id="candidates-panel">
        <div class="loading" id="loading-msg">Cargando candidates.json...</div>
        <div class="candidates-grid" id="candidates-grid" style="display:none;"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// State
let candidates = {};
let annotations = {};
let bundleIds = [];
let filteredBundleIds = [];
let currentIndex = 0;
let annotatorName = localStorage.getItem("annotatorName") || "";
let searchQuery = "";
let autoRejected = JSON.parse(localStorage.getItem("autoRejected") || "{}");

// Init
document.getElementById("annotator-name").value = annotatorName;
document.getElementById("annotator-name").addEventListener("input", e => {
    annotatorName = e.target.value.trim();
    localStorage.setItem("annotatorName", annotatorName);
});

document.getElementById("section-filter").addEventListener("change", () => {
    applyFilter();
    currentIndex = 0;
    renderBundle();
});

// Distribution controls
const repartoEl = document.getElementById("reparto-mode");
repartoEl.value = localStorage.getItem("repartoMode") || "0-1";

function hashBundleId(bid) {
    let h = 0;
    for (let i = 0; i < bid.length; i++) {
        h = ((h << 5) - h + bid.charCodeAt(i)) | 0;
    }
    return Math.abs(h);
}

repartoEl.addEventListener("change", () => {
    localStorage.setItem("repartoMode", repartoEl.value);
    applyFilter();
    currentIndex = 0;
    renderBundle();
    updateProgress();
});

// Load data
async function init() {
    try {
        const res = await fetch("/candidates.json");
        if (!res.ok) throw new Error("candidates.json no encontrado");
        const data = await res.json();
        candidates = data.bundles || {};
        bundleIds = Object.keys(candidates);
        filteredBundleIds = [...bundleIds];

        await loadAnnotations();

        document.getElementById("loading-msg").style.display = "none";
        document.getElementById("candidates-grid").style.display = "grid";

        // Restore last position
        const lastBundle = localStorage.getItem("lastBundle");
        if (lastBundle) {
            const idx = filteredBundleIds.indexOf(lastBundle);
            if (idx >= 0) currentIndex = idx;
        }

        renderBundle();
        updateProgress();

        // Poll annotations every 10s
        setInterval(async () => {
            await loadAnnotations();
            renderBundle();
            updateProgress();
        }, 10000);

    } catch (e) {
        document.getElementById("loading-msg").textContent =
            "Error: " + e.message + ". Ejecuta primero: python src/pipeline_human.py --generate-candidates";
    }
}

async function loadAnnotations() {
    try {
        const res = await fetch("/annotations.json");
        if (res.ok) annotations = await res.json();
    } catch (e) {}
}

function applyFilter() {
    const section = document.getElementById("section-filter").value;
    let ids;
    if (section === "all") {
        ids = [...bundleIds];
    } else {
        ids = bundleIds.filter(bid =>
            candidates[bid] && candidates[bid].section === section
        );
    }

    // Apply distribution based on hash of bundle ID
    const parts = repartoEl.value.split("-");
    const mySlot = parseInt(parts[0]);
    const totalSlots = parseInt(parts[1]);
    if (totalSlots > 1) {
        ids = ids.filter(bid => (hashBundleId(bid) % totalSlots) === mySlot);
    }

    const repartoInfo = document.getElementById("reparto-info");
    if (totalSlots > 1) {
        repartoInfo.textContent = `(${ids.length} bundles para ti)`;
    } else {
        repartoInfo.textContent = "";
    }

    filteredBundleIds = ids;
}

function renderBundle() {
    if (filteredBundleIds.length === 0) return;

    const bid = filteredBundleIds[currentIndex];
    const bundle = candidates[bid];
    if (!bundle) return;

    localStorage.setItem("lastBundle", bid);

    // Bundle info
    document.getElementById("bundle-id").textContent = bid;
    const badge = document.getElementById("section-badge");
    const secNames = {"1": "Mujer", "2": "Hombre", "3": "Ninos"};
    badge.textContent = secNames[bundle.section] || bundle.section;
    badge.className = "section-badge s" + bundle.section;
    document.getElementById("bundle-counter").textContent =
        `(${currentIndex + 1} / ${filteredBundleIds.length})`;

    // Bundle image
    document.getElementById("bundle-img").src = bundle.bundle_url;
    document.getElementById("bundle-img-container").classList.remove("zoomed");

    // Candidates
    const grid = document.getElementById("candidates-grid");
    grid.innerHTML = "";

    const bundleAnnotations = annotations[bid] || {};
    let mySelections = 0;
    let othersSelections = 0;

    const cands = bundle.candidates || [];

    const AUTO_THRESHOLD = 90;
    let autoCount = 0;

    // Split: auto-confirmed first (dimmed), then the rest for manual review
    const autoCands = cands.filter(c => (c.score || 0) >= AUTO_THRESHOLD);
    const manualCands = cands.filter(c => (c.score || 0) < AUTO_THRESHOLD);

    // Show auto-confirmed count
    autoCount = autoCands.length;

    // Render manual candidates first (these need human attention)
    manualCands.forEach((cand, i) => {
        const card = document.createElement("div");
        card.className = "candidate-card";
        card.dataset.productId = cand.product_id;
        card.dataset.description = (cand.description || "").toLowerCase();

        const prodAnnotation = bundleAnnotations[cand.product_id];
        const votes = prodAnnotation ? prodAnnotation.votes || [] : [];
        const iMine = votes.includes(annotatorName);
        const othersCount = votes.filter(v => v !== annotatorName).length;

        if (iMine) { card.classList.add("selected"); mySelections++; }
        if (othersCount > 0) { card.classList.add("others-selected"); othersSelections++; }

        if (searchQuery && !(cand.description || "").toLowerCase().includes(searchQuery) &&
            !(cand.product_id || "").toLowerCase().includes(searchQuery)) {
            card.style.display = "none";
        }

        card.innerHTML = `
            <span class="candidate-rank">#${cand.rank || (i + 1)}</span>
            <div class="candidate-check">&#10003;</div>
            ${votes.length > 0 && !iMine ? `<span class="votes-badge">${votes.length} voto${votes.length > 1 ? 's' : ''}</span>` : ''}
            ${votes.length > 0 && iMine && othersCount > 0 ? `<span class="votes-badge">${votes.length} votos</span>` : ''}
            <img class="candidate-img" src="${cand.product_url}" loading="lazy"
                 onerror="this.src='/images/products/${cand.product_id}.jpg'" alt="${cand.description}" />
            <div class="candidate-info">
                <div class="candidate-desc" title="${cand.description}">${cand.description || '?'}</div>
                <div class="candidate-score">Score: ${(cand.score || 0).toFixed(1)}</div>
            </div>
        `;

        card.addEventListener("click", () => toggleProduct(bid, cand.product_id, card));
        grid.appendChild(card);
    });

    // Render auto-confirmed at the end (greyed out, non-clickable)
    if (autoCands.length > 0) {
        const separator = document.createElement("div");
        separator.style.cssText = "grid-column: 1/-1; text-align:center; padding:6px; font-size:12px; color:#15803d; border-top:1px solid #1a3a1a; margin-top:4px;";
        separator.textContent = `${autoCands.length} producto(s) auto-confirmados por SKU (ya incluidos)`;
        grid.appendChild(separator);

        autoCands.forEach((cand) => {
            const card = document.createElement("div");
            const rejectKey = bid + "|" + cand.product_id;
            const isRejected = autoRejected[rejectKey];
            card.className = isRejected ? "candidate-card auto-rejected" : "candidate-card auto-confirmed";
            card.style.cursor = "pointer";
            card.innerHTML = `
                <span class="candidate-rank">#${cand.rank}</span>
                <span class="auto-badge">${isRejected ? 'MAL' : 'AUTO'}</span>
                <img class="candidate-img" src="${cand.product_url}" loading="lazy" alt="${cand.description}" />
                <div class="candidate-info">
                    <div class="candidate-desc" title="${cand.description}">${cand.description || '?'}</div>
                    <div class="candidate-score">${isRejected ? 'Rechazado - clic para restaurar' : 'SKU match - clic para rechazar'}</div>
                </div>
            `;
            card.addEventListener("click", () => {
                if (autoRejected[rejectKey]) {
                    delete autoRejected[rejectKey];
                } else {
                    autoRejected[rejectKey] = true;
                }
                localStorage.setItem("autoRejected", JSON.stringify(autoRejected));
                renderBundle();
            });
            grid.appendChild(card);
        });
    }

    // Summary
    document.getElementById("selection-summary").innerHTML =
        `Seleccionados: <strong>${mySelections}</strong> | Auto: ${autoCount} | Otros: ${othersSelections}`;
}

async function toggleProduct(bundleId, productId, cardEl) {
    if (!annotatorName) {
        showToast("Escribe tu nombre primero!");
        document.getElementById("annotator-name").focus();
        return;
    }

    const isSelected = cardEl.classList.contains("selected");
    const action = isSelected ? "remove" : "add";

    // Optimistic UI update
    if (action === "add") {
        cardEl.classList.add("selected");
    } else {
        cardEl.classList.remove("selected");
    }

    try {
        await fetch("/api/annotate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                bundle_id: bundleId,
                product_id: productId,
                annotator: annotatorName,
                action: action,
            }),
        });

        // Update local state
        if (!annotations[bundleId]) annotations[bundleId] = {};
        if (!annotations[bundleId][productId]) annotations[bundleId][productId] = {votes: []};
        const votes = annotations[bundleId][productId].votes;
        if (action === "add" && !votes.includes(annotatorName)) votes.push(annotatorName);
        if (action === "remove") {
            const idx = votes.indexOf(annotatorName);
            if (idx >= 0) votes.splice(idx, 1);
        }
        if (votes.length === 0) {
            delete annotations[bundleId][productId];
            if (Object.keys(annotations[bundleId]).length === 0) delete annotations[bundleId];
        }

        renderBundle();
        updateProgress();

    } catch (e) {
        // Revert on error
        if (action === "add") cardEl.classList.remove("selected");
        else cardEl.classList.add("selected");
        showToast("Error de conexion!");
    }
}

function updateProgress() {
    const total = filteredBundleIds.length;
    const annotated = filteredBundleIds.filter(bid => annotations[bid] && Object.keys(annotations[bid]).length > 0).length;
    const pct = total > 0 ? (annotated / total * 100) : 0;

    document.getElementById("progress-fill").style.width = pct + "%";
    document.getElementById("progress-text").textContent = `${annotated} / ${total} anotados`;

    const totalProducts = Object.values(annotations).reduce((sum, b) => sum + Object.keys(b).length, 0);
    document.getElementById("header-stats").textContent = `${totalProducts} productos marcados`;
}

function prevBundle() {
    if (currentIndex > 0) { currentIndex--; renderBundle(); }
}

function nextBundle() {
    if (currentIndex < filteredBundleIds.length - 1) { currentIndex++; renderBundle(); }
}

function nextUnannotated() {
    for (let i = currentIndex + 1; i < filteredBundleIds.length; i++) {
        const bid = filteredBundleIds[i];
        if (!annotations[bid] || Object.keys(annotations[bid]).length === 0) {
            currentIndex = i;
            renderBundle();
            return;
        }
    }
    // Wrap around
    for (let i = 0; i < currentIndex; i++) {
        const bid = filteredBundleIds[i];
        if (!annotations[bid] || Object.keys(annotations[bid]).length === 0) {
            currentIndex = i;
            renderBundle();
            return;
        }
    }
    showToast("Todos los bundles estan anotados!");
}

function toggleZoom() {
    document.getElementById("bundle-img-container").classList.toggle("zoomed");
}

function filterCandidates() {
    searchQuery = document.getElementById("search-box").value.toLowerCase().trim();
    renderBundle();
}

async function exportLabels() {
    try {
        const res = await fetch("/api/export", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ rejected: Object.keys(autoRejected) }),
        });
        const data = await res.json();
        if (data.ok) {
            showToast(`Exportados ${data.exported} pares a human_labels.csv`);
        }
    } catch (e) {
        showToast("Error al exportar!");
    }
}

function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
}

// Keyboard shortcuts
document.addEventListener("keydown", e => {
    if (e.target.tagName === "INPUT") return;
    if (e.key === "ArrowLeft") prevBundle();
    if (e.key === "ArrowRight") nextBundle();
    if (e.key === "n") nextUnannotated();
});

// Start
init();
</script>
</body>
</html>
